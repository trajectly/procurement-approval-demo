schema_version: "0.4"
name: "trt-procurement-agent-determinism-fix"
command: "python -m agents.procurement_agent_determinism_fix"
workdir: ..
fixture_policy: by_hash
strict: true
budget_thresholds:
  max_tool_calls: 7
  max_tokens: 700
contracts:
  tools:
    allow:
      [
        fetch_requisition,
        fetch_vendor_quotes,
        sample_random_score,
        route_for_approval,
        create_purchase_order,
      ]
    deny: [unsafe_direct_award]
  sequence:
    require:
      [
        tool:fetch_requisition,
        tool:fetch_vendor_quotes,
        tool:sample_random_score,
        tool:route_for_approval,
        tool:create_purchase_order,
      ]
    require_before:
      - before: tool:route_for_approval
        after: tool:create_purchase_order
